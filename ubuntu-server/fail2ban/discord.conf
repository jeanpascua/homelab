# fail2ban action: post ban/unban events to Discord via wrapper script.
# Drop in /etc/fail2ban/action.d/discord.conf.
# Wrapper at /usr/local/bin/fail2ban-discord reads webhook from
# /etc/homelab-alerts.env. Wrapper failure does NOT block the real ban.

[Definition]
actionstart = /usr/local/bin/fail2ban-discord START <name> -
actionstop  = /usr/local/bin/fail2ban-discord STOP <name> -
actionban   = /usr/local/bin/fail2ban-discord BAN <name> <ip> <failures>
actionunban = /usr/local/bin/fail2ban-discord UNBAN <name> <ip> -

[Init]
name = unknown
